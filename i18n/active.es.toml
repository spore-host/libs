# =============================================================================
# SPAWN - ROOT
# =============================================================================

[spawn.root.use]
other = "spawn"

[spawn.root.short]
other = "Lanza instancias AWS EC2 sin esfuerzo"

[spawn.root.long]
other = """spawn - Lanzador de instancias efímeras AWS EC2 (compañero de truffle)

spawn facilita el lanzamiento de instancias AWS:
  • Detecta automáticamente AMI (Amazon Linux 2023, incluyendo variantes GPU)
  • Configura automáticamente claves SSH (usa ~/.ssh/id_rsa por defecto)
  • Crea automáticamente VPC/subnet/grupos de seguridad (etiquetados para limpieza)
  • Instala agente spored para automonitoreo
  • Termina automáticamente por inactividad o TTL
  • Limpia automáticamente todos los recursos

Perfecto para:
  • Instancias rápidas de desarrollo/prueba
  • Trabajos de entrenamiento ML
  • Instancias Spot
  • Usuarios sin experiencia que solo necesitan cómputo

Ejemplos:
  # Desde truffle
  truffle search m7i.large | spawn

  # Instancia Spot
  truffle spot m7i.large --max-price 0.10 | spawn --spot

  # Entrenamiento GPU con terminación automática
  truffle capacity --gpu-only | spawn --ttl 24h --hibernate-on-idle

  # Lanzamiento directo
  spawn --instance-type m7i.large --region us-east-1

Filosofía Unix:
  truffle busca, spawn lanza
  Canaliza JSON de truffle a spawn para flujo de trabajo fluido"""

# =============================================================================
# SPAWN - LAUNCH
# =============================================================================

[spawn.launch.use]
other = "launch"

[spawn.launch.short]
other = "Lanzar una instancia EC2"

[spawn.launch.long]
other = """Lanzar una instancia EC2 con valores predeterminados inteligentes.

Tres formas de usar:
  1. Asistente interactivo (predeterminado sin entrada)
  2. Desde JSON de truffle vía pipe
  3. Directo con flags

Ejemplos:
  # Asistente interactivo
  spawn launch

  # Desde truffle
  truffle search m7i.large | spawn launch

  # Directo
  spawn launch --instance-type m7i.large --region us-east-1"""

