[lagotto.root.long]
other = "Lagotto surveille la disponibilité des types d'instances EC2 actuellement indisponibles\n(ex. instances GPU rares comme p5.48xlarge, ou capacité Spot dans une région préférée)\net notifie lorsque de la capacité apparaît.\n\nNommé d'après le Lagotto Romagnolo, le chien chercheur de truffes."

