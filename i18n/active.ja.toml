[spawn.launch.use]
other = "launch"

[spawn.launch.short]
other = "EC2インスタンスを起動"

[spawn.launch.long]
other = """スマートデフォルトでEC2インスタンスを起動します。

3つの使用方法：
  1. インタラクティブウィザード（入力がない場合のデフォルト）
  2. パイプ経由でtruffleのJSONから
  3. フラグで直接指定

使用例：
  # インタラクティブウィザード
  spawn launch

  # truffleから
  truffle search m7i.large | spawn launch

  # 直接指定
  spawn launch --instance-type m7i.large --region us-east-1"""

