# =============================================================================
# SPAWN - ルートコマンド
# =============================================================================

[spawn.root.use]
other = "spawn"

[spawn.root.short]
other = "AWS EC2インスタンスを簡単に起動"

[spawn.root.long]
other = """spawn - エフェメラルAWS EC2インスタンスランチャー（truffleの補完ツール）

spawnを使うとAWSインスタンスの起動が非常に簡単になります：
  • AMIを自動検出（Amazon Linux 2023、GPUバリアント含む）
  • SSHキーを自動設定（デフォルトで~/.ssh/id_rsaを使用）
  • VPC/サブネット/セキュリティグループを自動作成（クリーンアップ用にタグ付け）
  • sporedエージェントをインストールして自己監視
  • アイドルまたはTTLで自動終了
  • すべてのリソースを自動クリーンアップ

最適な用途：
  • 迅速な開発/テストインスタンス
  • ML学習ジョブ
  • スポットインスタンス
  • 専門知識がない方のコンピュート

使用例：
  # truffleから
  truffle search m7i.large | spawn

  # スポットインスタンス
  truffle spot m7i.large --max-price 0.10 | spawn --spot

  # GPU学習と自動終了
  truffle capacity --gpu-only | spawn --ttl 24h --hibernate-on-idle

  # 直接起動
  spawn --instance-type m7i.large --region us-east-1

Unix哲学：
  truffleが見つけ、spawnが起動
  truffleからspawnへJSONをパイプしてシームレスなワークフロー"""

