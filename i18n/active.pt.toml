# =============================================================================
# SPAWN - COMANDO RAIZ
# =============================================================================

[spawn.root.use]
other = "spawn"

[spawn.root.short]
other = "Lance instâncias AWS EC2 sem esforço"

[spawn.root.long]
other = """spawn - Lançador de instâncias AWS EC2 efêmeras (companheiro do truffle)

spawn facilita muito o lançamento de instâncias AWS:
  • Detecta AMI automaticamente (Amazon Linux 2023, incluindo variantes GPU)
  • Configura chaves SSH automaticamente (usa ~/.ssh/id_rsa por padrão)
  • Cria VPC/subnet/security groups automaticamente (marcados para limpeza)
  • Instala agente spored para auto-monitoramento
  • Termina automaticamente quando ocioso ou por TTL
  • Limpa automaticamente todos os recursos

Perfeito para:
  • Instâncias rápidas de dev/test
  • Jobs de treinamento ML
  • Instâncias Spot
  • Não especialistas que apenas precisam de computação

Exemplos:
  # Do truffle
  truffle search m7i.large | spawn

  # Instância Spot
  truffle spot m7i.large --max-price 0.10 | spawn --spot

  # Treinamento GPU com auto-terminação
  truffle capacity --gpu-only | spawn --ttl 24h --hibernate-on-idle

  # Lançamento direto
  spawn --instance-type m7i.large --region us-east-1

Filosofia Unix:
  truffle encontra, spawn lança
  Pipe JSON do truffle para spawn para fluxo de trabalho contínuo"""

# =============================================================================
# SPAWN - COMANDO LAUNCH
# =============================================================================

[spawn.launch.use]
other = "launch"

[spawn.launch.short]
other = "Lançar uma instância EC2"

[spawn.launch.long]
other = """Lança uma instância EC2 com padrões inteligentes.

Três formas de usar:
  1. Assistente interativo (padrão se não houver entrada)
  2. Do JSON do truffle via pipe
  3. Direto com flags

Exemplos:
  # Assistente interativo
  spawn launch

  # Do truffle
  truffle search m7i.large | spawn launch

  # Direto
  spawn launch --instance-type m7i.large --region us-east-1"""

