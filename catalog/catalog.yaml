# spore.host application catalog
#
# Container-based catalog (#290): each app ships as a Docker image pulled at
# launch onto a single shared DCV base AMI (base_amis below), instead of a baked
# per-app AMI. This removed the per-app-per-region AMI table that had drifted into
# dangling and duplicated IDs, none of which were even shared to the launch
# account (#389). Adding/updating an app is now a `docker push`, not a 9-region
# Packer matrix.
#
# GPU base: spore-dcv-gpu-al2023 — DCV 2025.0.20103 + NVIDIA 595.71.05 + Docker +
# NVIDIA Container Toolkit + spored, on AL2023. Built with
# infra/amis/dcv-gpu-al2023.pkr.hcl in the build account (942542972736) and shared
# to the launch account via share-base-ami.sh. CPU base AMIs are TBD; CPU apps
# below are not yet containerized.
#
# Images live under public.ecr.aws/f8g1e7l5 — the build account's default ECR
# Public alias. (A custom "spore-host" alias needs an async AWS approval; switch
# the image: prefixes if/when it's granted.)

# Shared GPU DCV base AMIs (one per region serves every GPU container app).
gpu_base_amis: &gpu_base_amis
  us-east-1: ami-0c37fb59c90d1ed3a  # spore-dcv-gpu-al2023, 2026-05-16
  # Build other regions: packer build -var region=<region> infra/amis/dcv-gpu-al2023.pkr.hcl
  us-east-2: ""
  us-west-1: ""
  us-west-2: ""
  eu-west-1: ""
  eu-west-2: ""
  eu-central-1: ""
  ap-southeast-1: ""
  ap-northeast-1: ""

apps:
  - name: paraview
    description: "Scientific visualization — CFD, FEA, large mesh"
    instance_families: [g6, g5, g4dn]
    high_vram_families: [g6e]
    min_vcpus: 4
    min_memory_gib: 16
    gpu: true
    min_vram_gib: 24
    dcv: true
    idle_timeout_default: 20m
    aliases: [pv]
    license: open-source
    # Containerized (#290): runs public.ecr.aws/f8g1e7l5/paraview:<tag> on the
    # shared GPU base AMI. The image CMD launches ParaView into the DCV display.
    image: public.ecr.aws/f8g1e7l5/paraview
    tag_default: "5.13.2"
    tags_available: ["5.13.2"]
    base_amis: *gpu_base_amis

  - name: chimerax
    description: "Protein structure visualization, cryo-EM (UCSF ChimeraX)"
    instance_families: [g6, g5]
    high_vram_families: [g6e]
    min_vcpus: 4
    min_memory_gib: 16
    gpu: true
    min_vram_gib: 24
    dcv: true
    idle_timeout_default: 20m
    aliases: [chimera]
    license: open-source
    # base AMI is ready; container image pending (Phase E migration, #290).
    image: public.ecr.aws/f8g1e7l5/chimerax
    tag_default: "1.12"
    tags_available: ["1.12"]
    base_amis: *gpu_base_amis

  - name: igv
    description: "Integrative Genomics Viewer — genome browser, sequencing data"
    instance_families: [c7i, m7i, c6i]
    min_vcpus: 4
    min_memory_gib: 16
    gpu: false
    dcv: true
    idle_timeout_default: 30m
    launch_command: /opt/igv/igv.sh
    license: open-source
    # CPU app — container image + CPU base AMI pending (#290).

  - name: qgis
    description: "GIS analysis, remote sensing, ecology"
    instance_families: [c7i, m7i]
    min_vcpus: 4
    min_memory_gib: 8
    gpu: false
    dcv: true
    idle_timeout_default: 30m
    launch_command: /usr/bin/qgis
    license: open-source

  - name: fiji
    description: "Image analysis — microscopy, histology, connectomics (ImageJ/Fiji)"
    instance_families: [c7i, m7i]
    min_vcpus: 4
    min_memory_gib: 16
    gpu: false
    dcv: true
    idle_timeout_default: 30m
    launch_command: /opt/fiji/ImageJ-linux64
    aliases: [imagej]
    license: open-source

  - name: ds9
    description: "Astronomical image display — observatory standard (SAO)"
    instance_families: [c7i, m7i]
    min_vcpus: 2
    min_memory_gib: 4
    gpu: false
    dcv: true
    idle_timeout_default: 30m
    launch_command: /usr/bin/ds9
    license: open-source
