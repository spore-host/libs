name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force bundled Node 20 actions (e.g. github-script inside
# codecov-action@v5) onto Node 24 ahead of GitHub's 2026-06-16 cutover.
# Belt-and-suspenders to the orion runner's /home/runner/.env (spore-host#345);
# this also covers GitHub-hosted fallback runs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    # Self-hosted runner on orion.local (Apple M4 Pro, arm64). To fall back to
    # GitHub-hosted, change this line to: runs-on: ubuntu-latest
    runs-on: [self-hosted, orion]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          # cache MUST stay false on the self-hosted orion runners: their
          # filesystem persists between jobs, so ~/go/pkg/mod is already warm.
          # setup-go's cache restore untars its archive over those files →
          # "tar: Cannot open: File exists", failing the job in Setup Go before
          # any code runs. Go reuses the on-disk module cache directly.
          cache: false

      - name: Test
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage gate
        env:
          # Ratchet floor — must not drop below this. Raise it as coverage
          # improves; target is 60% (see CLAUDE.md). Current: ~78.0%.
          MIN_COVERAGE: '75'
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "Total coverage: ${total}% (floor: ${MIN_COVERAGE}%)"
          awk -v t="$total" -v m="$MIN_COVERAGE" 'BEGIN { exit !(t+0 >= m+0) }' \
            || { echo "::error::coverage ${total}% is below floor ${MIN_COVERAGE}%"; exit 1; }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Vet
        run: go vet ./...

      # Online catalog gate (libs#18, spore-host#392): the shipped catalog must
      # reference only public, anonymously-pullable images, so a dead/private
      # global ref can't merge. Network-dependent, so it's behind the `online`
      # build tag (kept out of the default `go test`) and run as its own step.
      - name: Catalog image resolvability (online)
        run: go test -tags online ./catalog/ -run TestEmbeddedCatalogImagesAreAnonymouslyPullable -v
